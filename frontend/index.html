<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseNet — Social Media</title>
  <meta name="description" content="PulseNet: A high-performance social media platform powered by MongoDB. Discover trending posts, connect with users, and share your thoughts." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="screen active">
      <div class="auth-bg">
        <div class="auth-particles" id="particles"></div>
      </div>
      <div class="auth-container">
        <div class="auth-brand">
          <div class="brand-logo">
            <span class="logo-pulse"></span>
            <span class="brand-name">PulseNet</span>
          </div>
          <p class="brand-tagline">Where ideas go viral.</p>
        </div>
        <div class="auth-card glass">
          <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
            <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Sign Up</button>
          </div>

          <!-- LOGIN FORM -->
          <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label for="login-username">Username</label>
              <input type="text" id="login-username" placeholder="Enter username" required autocomplete="username" />
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" placeholder="Enter password" required autocomplete="current-password" />
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="login-btn">
              <span class="btn-text">Sign In</span>
              <span class="btn-loader hidden"></span>
            </button>
            <div id="login-error" class="form-error hidden"></div>
          </form>

          <!-- REGISTER FORM -->
          <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
              <label for="reg-username">Username</label>
              <input type="text" id="reg-username" placeholder="Choose a username" required minlength="3" autocomplete="username" />
            </div>
            <div class="form-group">
              <label for="reg-email">Email</label>
              <input type="email" id="reg-email" placeholder="your@email.com" required autocomplete="email" />
            </div>
            <div class="form-group">
              <label for="reg-password">Password</label>
              <input type="password" id="reg-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password" />
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="register-btn">
              <span class="btn-text">Create Account</span>
              <span class="btn-loader hidden"></span>
            </button>
            <div id="register-error" class="form-error hidden"></div>
          </form>
        </div>
      </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-screen" class="screen hidden">
      <!-- SIDEBAR -->
      <aside class="sidebar glass" id="sidebar">
        <div class="sidebar-brand">
          <div class="brand-logo small">
            <span class="logo-pulse"></span>
            <span class="brand-name">PulseNet</span>
          </div>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item active" id="nav-feed" onclick="showPage('feed')">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
            <span>Feed</span>
          </button>
          <button class="nav-item" id="nav-profile" onclick="showPage('profile')">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>My Profile</span>
          </button>
          <button class="nav-item" id="nav-admin" onclick="showPage('admin')" style="display:none">
            <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span>Admin Panel</span>
          </button>
        </nav>
        <div class="sidebar-user">
          <div class="user-avatar" id="sidebar-avatar"></div>
          <div class="user-info">
            <span class="user-name" id="sidebar-username"></span>
            <span class="user-role" id="sidebar-role"></span>
          </div>
          <button class="btn-icon logout-btn" onclick="handleLogout()" title="Logout">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </aside>

      <!-- MOBILE TOPBAR -->
      <header class="mobile-topbar glass">
        <div class="brand-logo small">
          <span class="logo-pulse"></span>
          <span class="brand-name">PulseNet</span>
        </div>
        <button class="btn-icon" onclick="toggleMobileNav()">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </header>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <!-- FEED PAGE -->
        <div id="page-feed" class="page active">
          <div class="page-header">
            <h1>Discover</h1>
            <div class="feed-filters">
              <button class="filter-btn active" id="filter-trending" onclick="setFeedFilter('trending')">🔥 Trending</button>
              <button class="filter-btn" id="filter-recent" onclick="setFeedFilter('recent')">⚡ Recent</button>
              <button class="filter-btn" id="filter-top" onclick="setFeedFilter('top-liked')">💚 Top Liked</button>
            </div>
          </div>
          <div class="new-post-area glass">
            <div class="new-post-avatar" id="feed-avatar"></div>
            <button class="new-post-trigger" id="new-post-trigger" onclick="openPostModal()">What's on your mind?</button>
          </div>
          <div id="feed-posts" class="posts-list">
            <div class="loader-container"><div class="spinner"></div></div>
          </div>
          <button class="load-more-btn" id="feed-load-more" onclick="loadMoreFeed()" style="display:none">Load More</button>
        </div>

        <!-- PROFILE PAGE (OWN) -->
        <div id="page-profile" class="page hidden">
          <div class="profile-hero glass">
            <div class="profile-avatar-large" id="profile-avatar-large"></div>
            <div class="profile-info">
              <h1 id="profile-username">Username</h1>
              <p class="profile-email" id="profile-email"></p>
              <p class="profile-joined" id="profile-joined"></p>
              <div class="profile-stats">
                <div class="stat-chip">
                  <span class="stat-value" id="profile-posts">0</span>
                  <span class="stat-label">Posts</span>
                </div>
                <div class="stat-chip">
                  <span class="stat-value" id="profile-followers">0</span>
                  <span class="stat-label">Followers</span>
                </div>
              </div>
            </div>
            <button class="btn btn-outline" onclick="openEditProfileModal()">Edit Profile</button>
          </div>
          <div class="profile-posts-section">
            <div class="section-header">
              <h2>Your Posts</h2>
              <button class="btn btn-primary btn-sm" onclick="openPostModal()">+ New Post</button>
            </div>
            <div id="profile-posts-list" class="posts-list">
              <div class="loader-container"><div class="spinner"></div></div>
            </div>
            <button class="load-more-btn" id="profile-load-more" onclick="loadMoreProfilePosts()" style="display:none">Load More</button>
          </div>
        </div>

        <!-- OTHER USER PROFILE PAGE -->
        <div id="page-user-profile" class="page hidden">
          <div class="profile-hero glass">
            <div class="profile-avatar-large" id="other-profile-avatar"></div>
            <div class="profile-info">
              <h1 id="other-profile-username">Username</h1>
              <p class="profile-joined" id="other-profile-joined"></p>
              <div class="profile-stats">
                <div class="stat-chip">
                  <span class="stat-value" id="other-profile-posts">0</span>
                  <span class="stat-label">Posts</span>
                </div>
                <div class="stat-chip">
                  <span class="stat-value" id="other-profile-followers">0</span>
                  <span class="stat-label">Followers</span>
                </div>
              </div>
            </div>
            <button class="btn btn-outline" onclick="showPage('feed')">← Back</button>
          </div>
          <div class="profile-posts-section">
            <h2 id="other-profile-posts-title">Posts</h2>
            <div id="other-profile-posts-list" class="posts-list">
              <div class="loader-container"><div class="spinner"></div></div>
            </div>
            <button class="load-more-btn" id="other-profile-load-more" onclick="loadMoreOtherPosts()" style="display:none">Load More</button>
          </div>
        </div>

        <!-- ADMIN PAGE -->
        <div id="page-admin" class="page hidden">
          <div class="page-header">
            <h1>🛡️ Admin Panel</h1>
            <div class="admin-stats-row" id="admin-stats-row"></div>
          </div>
          <div class="admin-tabs">
            <button class="admin-tab active" id="atab-users" onclick="switchAdminTab('users')">Users</button>
            <button class="admin-tab" id="atab-posts" onclick="switchAdminTab('posts')">Posts</button>
            <button class="admin-tab" id="atab-comments" onclick="switchAdminTab('comments')">Comments</button>
          </div>
          <div id="admin-content" class="admin-content">
            <div class="loader-container"><div class="spinner"></div></div>
          </div>
        </div>
      </main>
    </div>

    <!-- POST MODAL -->
    <div id="post-modal" class="modal-overlay hidden" onclick="closePostModal(event)">
      <div class="modal">
        <div class="modal-header">
          <h2 id="post-modal-title">New Post</h2>
          <button class="btn-icon" onclick="closePostModal()">✕</button>
        </div>
        <form onsubmit="submitPost(event)">
          <textarea id="post-content" placeholder="Share something amazing..." maxlength="1000" rows="5" required></textarea>
          <div class="char-counter"><span id="char-count">0</span>/1000</div>
          <div class="modal-footer">
            <button type="button" class="btn btn-ghost" onclick="closePostModal()">Cancel</button>
            <button type="submit" class="btn btn-primary" id="post-submit-btn">
              <span class="btn-text" id="post-btn-text">Publish</span>
              <span class="btn-loader hidden" id="post-btn-loader"></span>
            </button>
          </div>
          <div id="post-error" class="form-error hidden"></div>
        </form>
      </div>
    </div>

    <!-- EDIT PROFILE MODAL -->
    <div id="edit-profile-modal" class="modal-overlay hidden" onclick="closeEditProfileModal(event)">
      <div class="modal">
        <div class="modal-header">
          <h2>Edit Profile</h2>
          <button class="btn-icon" onclick="closeEditProfileModal()">✕</button>
        </div>
        <form onsubmit="submitEditProfile(event)">
          <div class="form-group">
            <label for="edit-email">New Email</label>
            <input type="email" id="edit-email" placeholder="Leave blank to keep current" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="edit-password">New Password</label>
            <input type="password" id="edit-password" placeholder="Leave blank to keep current" autocomplete="new-password" minlength="6" />
          </div>
          <div id="edit-profile-version" style="display:none"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-ghost" onclick="closeEditProfileModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
          <div id="edit-profile-error" class="form-error hidden"></div>
        </form>
      </div>
    </div>

    <!-- COMMENTS MODAL -->
    <div id="comments-modal" class="modal-overlay hidden" onclick="closeCommentsModal(event)">
      <div class="modal modal-wide">
        <div class="modal-header">
          <h2>Comments</h2>
          <button class="btn-icon" onclick="closeCommentsModal()">✕</button>
        </div>
        <div id="comments-post-preview" class="comments-post-preview"></div>
        <div id="comments-list" class="comments-list"></div>
        <form class="comment-form" onsubmit="submitComment(event)">
          <input type="text" id="comment-input" placeholder="Write a comment..." required maxlength="500" />
          <button type="submit" class="btn btn-primary btn-sm">Post</button>
        </form>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
